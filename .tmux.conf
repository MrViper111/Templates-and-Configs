set-option -g status-position top
set -g mouse on
set -g status-style "bg=#313244,fg=#cdd6f4"

set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#313244,fg=#cba6f7] "
set -g status-left-length 20

set -g status-right " #[fg=#a6e3a1]  #{ram_percentage} #[fg=#585b70]│ #[fg=#cdd6f4] %H:%M  "
set -g status-right-length 40

set -g window-status-current-format "#[bg=#45475a,fg=#cba6f7,bold] #I:#W#F "
set -g window-status-format "#[fg=#585b70] #I:#W#F "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
run '~/.tmux/plugins/tpm/tpm'
